services:
  - type: web
    name: tramita-scraper
    runtime: node
    repo: https://github.com/ohanagroup/tramita
    branch: main
    rootDir: backend_node
    buildCommand: npm install --production && npx playwright install chromium
    startCommand: node src/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: SCRAPER_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://tramita.vercel.app
